[package]
    name    = "client"
    version = "0.1.0"
    edition = "2024"

[lib]
    crate-type = ["cdylib", "rlib"]
    path       = "src/lib.rs"
    name       = "client_lib"

[[bin]]
    path = "src/native.rs"
    name = "client"

[dependencies]
    slint = "*"

[build-dependencies]
    anyhow      = "*"
    slint-build = "*"
    json        = "*"

[target.'cfg(target_family = "wasm")'.dependencies]
    wasm-bindgen = { version = "*" }
